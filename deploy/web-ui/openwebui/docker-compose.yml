# Portal — Open WebUI Stack
# Usage: docker compose up -d
# Requires: Ollama running on host at :11434
#           Portal router running on host at :8000
#           Portal WebInterface running on host at :8081

services:
  # -----------------------------------------------------------------------
  # Caddy — reverse proxy and static file server
  # -----------------------------------------------------------------------
  caddy:
    image: caddy:2
    container_name: portal-caddy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${AI_OUTPUT_DIR:-${HOME}/AI_Output}:/srv/ai-output:ro
    environment:
      - DOCKER_HOST_IP=${DOCKER_HOST_IP:-host.docker.internal}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      open-webui:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Open WebUI — browser chat UI
  # -----------------------------------------------------------------------
  # To use latest version, run: docker compose pull open-webui
  # Check for updates: https://github.com/open-webui/open-webui/releases
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: portal-open-webui
    restart: unless-stopped
    pull_policy: always
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # Point to Portal WebInterface as the OpenAI-compatible backend
      - OPENAI_API_BASE_URL=http://portal-core:8081/v1
      - OPENAI_API_KEY=portal
      # Also expose direct Ollama access for model management
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-portal-secret-change-me}
      - WEBUI_AUTH=${WEBUI_AUTH:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    depends_on:
      portal-core:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Portal Core — WebInterface (OpenAI-compatible endpoint)
  # -----------------------------------------------------------------------
  portal-core:
    build:
      context: ../../../
      dockerfile: Dockerfile
    container_name: portal-core
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ${HOME}/.portal:/home/portal/.portal
      - ${HOME}/Projects:/mnt/projects:ro
    environment:
      - COMPUTE_BACKEND=${COMPUTE_BACKEND:-mps}
      - PORTAL_BACKENDS__OLLAMA_URL=http://host.docker.internal:11434
      - PORTAL_BACKENDS__AUTO_PULL_MODELS=${PORTAL_BACKENDS__AUTO_PULL_MODELS:-true}
      - ROUTER_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

# -----------------------------------------------------------------------
  # MCP Services - Standalone (no external dependencies)
  # -----------------------------------------------------------------------
  # Document tools MCP (Word/PowerPoint/Excel generation)
  mcp-documents:
    build:
      context: ../../../
      dockerfile: Dockerfile
    container_name: portal-mcp-documents
    restart: unless-stopped
    working_dir: /app
    environment:
      - DOCUMENTS_MCP_PORT=8913
    command: ["python", "-m", "portal_mcp.documents.document_mcp"]
    ports:
      - "8913:8913"
    volumes:
      - ${HOME}/AI_Output:/app/data/generated

  # Music generation MCP (AudioCraft/MusicGen)
  mcp-music:
    build:
      context: ../../../
      dockerfile: Dockerfile
    container_name: portal-mcp-music
    restart: unless-stopped
    working_dir: /app
    environment:
      - MUSIC_MCP_PORT=8912
    command: ["python", "-m", "portal_mcp.generation.music_mcp"]
    ports:
      - "8912:8912"
    volumes:
      - ${HOME}/AI_Output:/app/data/generated

  # TTS MCP (Fish Speech / CosyVoice)
  mcp-tts:
    build:
      context: ../../../
      dockerfile: Dockerfile
    container_name: portal-mcp-tts
    restart: unless-stopped
    working_dir: /app
    environment:
      - TTS_MCP_PORT=8916
      - TTS_BACKEND=${TTS_BACKEND:-fish_speech}
    command: ["python", "-m", "portal_mcp.generation.tts_mcp"]
    ports:
      - "8916:8916"
    volumes:
      - ${HOME}/AI_Output:/app/data/generated

volumes:
  open-webui-data:
