services:
  ollama:
    image: ollama/ollama:latest
    container_name: portal-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10

  # Pull required models before portal-api starts (DC-05)
  ollama-model-init:
    image: ollama/ollama:latest
    container_name: portal-ollama-init
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    command: >
      sh -c "
        ollama pull dolphin-llama3:8b &&
        echo 'Model pull complete'
      "
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: portal-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: portal-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  portal-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-api
    ports:
      - "8081:8081"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PORTAL_MEMORY_PROVIDER=${PORTAL_MEMORY_PROVIDER:-sqlite}
      - PORTAL_MEMORY_DB=/app/data/memory.db
      - PORTAL_AUTH_DB=/app/data/auth.db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - WEB_PORT=8081
      - PORTAL_BOOTSTRAP_API_KEY=${PORTAL_BOOTSTRAP_API_KEY:?Set PORTAL_BOOTSTRAP_API_KEY in .env}
      - PORTAL_BOOTSTRAP_USER_ID=${PORTAL_BOOTSTRAP_USER_ID:-open-webui}
      - COMFYUI_URL=${COMFYUI_URL:-http://comfyui:8188}
      # MCP server URLs for tool calling
      - COMFYUI_MCP_URL=http://mcp-comfyui:8910
      - VIDEO_MCP_URL=http://mcp-video:8911
      - MUSIC_MCP_URL=http://mcp-music:8912
      - DOCUMENTS_MCP_URL=http://mcp-documents:8913
      - SANDBOX_MCP_URL=http://mcp-sandbox:8914
      - WHISPER_MCP_URL=http://mcp-whisper:8915
      - TTS_MCP_URL=http://mcp-tts:8916
      - GENERATION_SERVICES=${GENERATION_SERVICES:-false}
      - SANDBOX_ENABLED=${SANDBOX_ENABLED:-false}
    volumes:
      - ./data:/app/data
      - ./mcp:/app/mcp
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: ["uvicorn", "portal.interfaces.web.server:create_app", "--factory", "--host", "0.0.0.0", "--port", "8081"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Proxy router for workspace-based routing (DC-03)
  portal-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-router
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - ROUTER_PORT=8000
      - ROUTER_BIND_IP=0.0.0.0
      - ROUTER_TOKEN=${ROUTER_TOKEN:-}
    volumes:
      - ./src/portal/routing/router_rules.json:/app/src/portal/routing/router_rules.json:ro
    depends_on:
      ollama:
        condition: service_healthy
    command: ["python", "-m", "portal.routing.router"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: portal-open-webui
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://portal-api:8081/v1
      - OPENAI_API_KEY=${PORTAL_BOOTSTRAP_API_KEY:?Set PORTAL_BOOTSTRAP_API_KEY in .env}
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      portal-api:
        condition: service_healthy

  whisper:
    image: ghcr.io/fedirz/faster-whisper-server:latest
    container_name: portal-whisper
    ports:
      - "10300:10300"

  # ComfyUI for image (and video) generation (DC-01)
  # NOTE: Requires GPU passthrough. Enable with: docker-compose --profile gpu up
  # For Mac bare-metal, run ComfyUI natively (see hardware/m4-mac/launch.sh)
  #
  # Model download instructions for ComfyUI:
  # 1. FLUX models (image generation):
  #    - Download flux1-dev.safetensors from https://huggingface.co/black-forest-labs/FLUX.1-dev
  #    - Place in: models/checkpoints/
  # 2. SDXL models (alternative image generation):
  #    - Download sd_xl_base_1.0.safetensors from https://huggingface.co/stabilityai/stable-diffusion-xl-base-1.0
  #    - Place in: models/checkpoints/
  # 3. Wan2.2 models (video generation):
  #    - Download wan2.2_t2v_5B_fp16.safetensors from https://huggingface.co/Wan-AI/Wan2.2-T2V-5B
  #    - Download clip_l.safetensors and clip_g.safetensors from https://huggingface.co/comfyanonymous/flux_text_encoders
  #    - Download sd3m.safetensors from https://huggingface.co/Comfy-Org/stable-diffusion-3-medium
  #    - Place in: models/checkpoints/ and models/vae/
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest-cuda
    container_name: portal-comfyui
    ports:
      - "8188:8188"
    volumes:
      - comfyui_models:/opt/ComfyUI/models
      - comfyui_output:/opt/ComfyUI/output
    environment:
      - COMFYUI_EXTRA_ARGS=--listen
    # Uncomment for NVIDIA GPU:
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    #   - COMFYUI_EXTRA_ARGS=--listen --cuda-device 0
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5

  mcp-filesystem:
    image: node:20-alpine
    container_name: portal-mcp-filesystem
    working_dir: /srv
    command: ["sh", "-c", "npm i -g @modelcontextprotocol/server-filesystem && mcp-server-filesystem /portal/data"]
    volumes:
      - ./data:/portal/data

  mcp-shell:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-mcp-shell
    working_dir: /app
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: ["uvicorn", "scripts.mcp.bash_mcp_server:app", "--host", "0.0.0.0", "--port", "8091"]
    ports:
      - "8091:8091"
    volumes:
      - ./data:/app/data
      - ./scripts/mcp:/app/scripts/mcp
      - ./src:/app/src:ro
    depends_on:
      redis:
        condition: service_healthy

  mcp-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-mcp-web
    working_dir: /app
    command: ["uvicorn", "scripts.mcp.web_scrape_mcp_server:app", "--host", "0.0.0.0", "--port", "8092"]
    ports:
      - "8092:8092"
    volumes:
      - ./scripts/mcp:/app/scripts/mcp:ro
      - ./src:/app/src:ro

  # ComfyUI MCP server — bridges portal-api to ComfyUI (DC-02)
  mcp-comfyui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-mcp-comfyui
    working_dir: /app
    environment:
      - COMFYUI_URL=http://comfyui:8188
      - COMFYUI_MCP_PORT=8910
    command: ["python", "-m", "mcp.generation.comfyui_mcp"]
    ports:
      - "8910:8910"
    volumes:
      - ./mcp:/app/mcp:ro
    depends_on:
      - comfyui
    profiles:
      - gpu

  # Whisper MCP server (DC-02)
  mcp-whisper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-mcp-whisper
    working_dir: /app
    environment:
      - WHISPER_URL=http://whisper:10300
      - WHISPER_MCP_PORT=8915
    command: ["python", "-m", "mcp.generation.whisper_mcp"]
    ports:
      - "8915:8915"
    volumes:
      - ./mcp:/app/mcp:ro
    depends_on:
      - whisper

  # Video generation MCP (requires ComfyUI with video models)
  mcp-video:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-mcp-video
    working_dir: /app
    environment:
      - COMFYUI_URL=http://comfyui:8188
      - VIDEO_MCP_PORT=8911
    command: ["python", "-m", "mcp.generation.video_mcp"]
    ports:
      - "8911:8911"
    volumes:
      - ./mcp:/app/mcp:ro
      - ./data/generated:/app/data/generated
    depends_on:
      - comfyui
    profiles:
      - gpu

  # Music generation MCP (AudioCraft; models downloaded on first use)
  mcp-music:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-mcp-music
    working_dir: /app
    environment:
      - MUSIC_MCP_PORT=8912
    command: ["python", "-m", "mcp.generation.music_mcp"]
    ports:
      - "8912:8912"
    volumes:
      - ./mcp:/app/mcp:ro
      - ./data/generated:/app/data/generated
    profiles:
      - gpu

  # Document tools MCP (Word/PowerPoint/Excel)
  mcp-documents:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-mcp-documents
    working_dir: /app
    environment:
      - DOCUMENTS_MCP_PORT=8913
    command: ["python", "-m", "mcp.documents.document_mcp"]
    ports:
      - "8913:8913"
    volumes:
      - ./mcp:/app/mcp:ro
      - ./src:/app/src:ro
      - ./data/generated:/app/data/generated

  # Code execution sandbox MCP (Docker-in-Docker; SANDBOX_ENABLED must be true)
  mcp-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-mcp-sandbox
    working_dir: /app
    environment:
      - SANDBOX_MCP_PORT=8914
    command: ["python", "-m", "mcp.execution.code_sandbox_mcp"]
    ports:
      - "8914:8914"
    volumes:
      - ./mcp:/app/mcp:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/sandbox:/app/data/sandbox

  # TTS MCP server (Fish Speech / CosyVoice)
  # Models downloaded on first use - Fish Speech requires: https://github.com/fishaudio/fish-speech
  mcp-tts:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-mcp-tts
    working_dir: /app
    environment:
      - TTS_MCP_PORT=8916
      - TTS_BACKEND=${TTS_BACKEND:-fish_speech}
    command: ["python", "-m", "mcp.generation.tts_mcp"]
    ports:
      - "8916:8916"
    volumes:
      - ./mcp:/app/mcp:ro
      - ./data/generated:/app/data/generated
    profiles:
      - gpu

volumes:
  ollama_data:
  qdrant_data:
  openwebui_data:
  comfyui_models:
  comfyui_output:
